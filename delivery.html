<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建筑工程事业部 — 基地发货效率全景看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" onerror="var s=document.createElement('script');s.src='https://unpkg.com/chart.js@4.4.1/dist/chart.umd.min.js';document.head.appendChild(s);"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #0a1628;
  color: #e0e6f0;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0f1d35; }
::-webkit-scrollbar-thumb { background: #2a4066; border-radius: 3px; }

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, #0d1f3c 0%, #142a50 50%, #1a3a6a 100%);
  padding: 28px 32px 20px;
  border-bottom: 2px solid #d4a843;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 50%, rgba(212,168,67,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.header-content {
  max-width: 1400px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center;
  position: relative; z-index: 1;
}
.header h1 {
  font-size: 22px; font-weight: 700;
  background: linear-gradient(90deg, #f6c94a, #d4a843);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}
.header-sub {
  color: #8892b0; font-size: 13px; margin-top: 4px;
}
.header-badge {
  background: rgba(212,168,67,0.15);
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 20px; padding: 6px 18px;
  font-size: 13px; color: #d4a843;
}

/* ===== CONTAINER ===== */
.container { max-width: 1440px; margin: 0 auto; padding: 24px 20px; }

/* ===== KPI CARDS ===== */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.kpi-card {
  background: linear-gradient(135deg, #112240, #0f1d35);
  border: 1px solid #1a3055;
  border-radius: 12px;
  padding: 20px 24px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.kpi-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.kpi-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  border-radius: 4px 0 0 4px;
}
.kpi-card:nth-child(1)::after { background: #4fc3f7; }
.kpi-card:nth-child(2)::after { background: #d4a843; }
.kpi-card:nth-child(3)::after { background: #81c784; }
.kpi-card:nth-child(4)::after { background: #ef5350; }

.kpi-label { font-size: 13px; color: #8892b0; margin-bottom: 8px; letter-spacing: 1px; }
.kpi-value { font-size: 28px; font-weight: 700; color: #e6edf5; }
.kpi-value .unit { font-size: 14px; color: #8892b0; font-weight: 400; margin-left: 4px; }
.kpi-sub { font-size: 12px; color: #8892b0; margin-top: 6px; }
.kpi-sub .highlight { color: #d4a843; font-weight: 600; }
.kpi-sub .green { color: #81c784; }
.kpi-sub .red { color: #ef5350; }

/* ===== CHARTS ===== */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
.chart-panel {
  background: linear-gradient(135deg, #112240, #0f1d35);
  border: 1px solid #1a3055;
  border-radius: 12px;
  padding: 20px;
}
.chart-title {
  font-size: 15px; color: #d4a843;
  margin-bottom: 16px; font-weight: 600;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(212,168,67,0.15);
  display: flex; justify-content: space-between; align-items: center;
}
.chart-title .chart-sub {
  font-size: 12px; color: #8892b0; font-weight: 400;
}
.chart-wrap { position: relative; width: 100%; }

/* ===== BASE CARDS ===== */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.base-card {
  background: linear-gradient(135deg, #112240, #0f1d35);
  border: 1px solid #1a3055;
  border-radius: 12px;
  padding: 18px 20px;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.3s;
}
.base-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.base-card.expanded {
  border-color: rgba(212,168,67,0.4);
}
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.card-name {
  font-size: 16px; font-weight: 600; color: #e6edf5;
}
.card-status {
  font-size: 11px; padding: 3px 12px;
  border-radius: 20px; font-weight: 600;
  letter-spacing: 1px;
}
.card-status.excellent { background: rgba(76,175,80,0.15); color: #81c784; border: 1px solid rgba(76,175,80,0.3); }
.card-status.good { background: rgba(255,152,0,0.15); color: #ffb74d; border: 1px solid rgba(255,152,0,0.3); }
.card-status.pending { background: rgba(255,235,59,0.1); color: #ffd54f; border: 1px solid rgba(255,235,59,0.2); }
.card-status.critical { background: rgba(244,67,54,0.15); color: #ef9a9a; border: 1px solid rgba(244,67,54,0.3); }

.card-stats {
  display: flex; gap: 16px; margin-bottom: 10px;
  font-size: 12px; color: #8892b0;
}
.card-stats span { display: flex; align-items: center; gap: 4px; }
.card-stats .stat-val { color: #e6edf5; font-weight: 600; }

/* Mini bar */
.mini-bar-wrap { margin-bottom: 4px; }
.mini-bar-label { font-size: 11px; color: #8892b0; margin-bottom: 4px; display: flex; justify-content: space-between; }
.mini-bar {
  height: 10px; border-radius: 5px; overflow: hidden;
  display: flex; background: rgba(255,255,255,0.05);
}
.mini-bar .seg { height: 100%; transition: width 0.5s; }
.mini-bar .seg.opt { background: linear-gradient(90deg, #1a8bc4, #4fc3f7); }
.mini-bar .seg.nonopt { background: linear-gradient(90deg, #d84315, #ff8a65); }

.card-expand-btn {
  font-size: 12px; color: #d4a843;
  cursor: pointer; user-select: none;
  padding: 4px 0; transition: color 0.2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.card-expand-btn:hover { color: #f6c94a; }
.card-expand-btn .arrow {
  display: inline-block; transition: transform 0.3s;
  font-size: 10px;
}
.expanded .card-expand-btn .arrow { transform: rotate(180deg); }

/* Province table */
.province-table-wrap {
  max-height: 0; overflow: hidden;
  transition: max-height 0.35s ease;
}
.expanded .province-table-wrap { max-height: 500px; }
.province-table {
  width: 100%; border-collapse: collapse;
  margin-top: 12px; font-size: 12px;
}
.province-table th {
  text-align: left; padding: 6px 8px;
  border-bottom: 1px solid rgba(212,168,67,0.15);
  color: #8892b0; font-weight: 500; font-size: 11px;
  white-space: nowrap;
}
.province-table td {
  padding: 6px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: #c8d0dc;
}
.province-table tr:last-child td { border-bottom: none; }
.province-table tbody tr:hover td { background: rgba(212,168,67,0.06); }
.province-table .amt { font-variant-numeric: tabular-nums; text-align: right; }
.province-table .pct-cell { color: #d4a843; text-align: right; white-space: nowrap; }
.province-table .prov-name { font-weight: 500; }
.province-table .opt-amt { color: #4fc3f7; }
.province-table .nonopt-amt { color: #ff8a65; }
.impact-bar {
  display: inline-block; width: 0; height: 6px; border-radius: 3px;
  background: linear-gradient(90deg, #d4a843, rgba(212,168,67,0.15));
  vertical-align: middle; margin-right: 4px;
}

/* ===== INSIGHTS ===== */
.insights-panel {
  background: linear-gradient(135deg, #112240, #0f1d35);
  border: 1px solid #1a3055;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
}
.insights-title {
  font-size: 16px; color: #d4a843;
  margin-bottom: 18px; font-weight: 600;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(212,168,67,0.15);
}
.insights-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
.insight-item {
  padding: 14px 16px;
  border-radius: 8px;
  border-left: 3px solid;
  font-size: 13px; line-height: 1.7;
}
.insight-item.urgent { background: rgba(244,67,54,0.06); border-color: #ef5350; }
.insight-item.urgent .insight-tag { color: #ef5350; }
.insight-item.best { background: rgba(76,175,80,0.06); border-color: #81c784; }
.insight-item.best .insight-tag { color: #81c784; }
.insight-tag { font-weight: 700; display: block; margin-bottom: 4px; }
.insight-detail { color: #a0aab8; }

/* ===== FOOTER ===== */
.footer {
  text-align: center; padding: 20px;
  border-top: 1px solid #1a3055;
  font-size: 12px; color: #5a6a8a;
}
.footer .sep { margin: 0 12px; color: #2a4066; }
.legend-wrap {
  display: flex; gap: 20px; justify-content: center;
  margin-top: 16px; flex-wrap: wrap;
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: #8892b0;
}
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }
.legend-dot.opt { background: #4fc3f7; }
.legend-dot.nonopt { background: #ff8a65; }
.legend-dot.rate { background: #d4a843; }
.legend-line { width: 20px; border-top: 2px dashed #81c784; }

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .cards-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .charts-row { grid-template-columns: 1fr; }
  .cards-grid { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .kpi-value { font-size: 22px; }
  .insights-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 17px; }
  .header-content { flex-direction: column; gap: 10px; align-items: flex-start; }
}
@media (max-width: 480px) {
  .kpi-row { grid-template-columns: 1fr; }
  .container { padding: 16px 12px; }
  .header { padding: 18px 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <div>
      <h1>建筑工程事业部 — 基地发货效率全景看板</h1>
      <div class="header-sub">Delivery Efficiency Panoramic Dashboard · 数据驱动决策 · 持续优化供应链</div>
    </div>
    <div class="header-badge">实时看板</div>
  </div>
</div>

<div class="container">

  <!-- KPI Cards -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-panel">
      <div class="chart-title">
        <span>各基地最优发货率 + 金额对比</span>
        <span class="chart-sub">柱: 金额(万) · 折线: 最优率(%) · 虚线: 阈值线</span>
      </div>
      <div class="chart-wrap"><canvas id="leftChart"></canvas></div>
    </div>
    <div class="chart-panel">
      <div class="chart-title">
        <span>省区非最优金额 TOP 排行</span>
        <span class="chart-sub">跨基地汇总 · 万元</span>
      </div>
      <div class="chart-wrap"><canvas id="rightChart"></canvas></div>
    </div>
  </div>

  <!-- Base Cards -->
  <div class="cards-grid" id="cardsGrid"></div>

  <!-- Insights -->
  <div class="insights-panel" id="insightsPanel"></div>

  <!-- Footer -->
  <div class="footer">
    <span>数据更新时间: 2026年5月</span>
    <span class="sep">|</span>
    <span>建筑工程事业部 运营管理部</span>
    <span class="sep">|</span>
    <span>注: 最优发货率 = 最优路线发货金额 / 总发货金额</span>
    <div class="legend-wrap">
      <div class="legend-item"><div class="legend-dot opt"></div>最优金额</div>
      <div class="legend-item"><div class="legend-dot nonopt"></div>非最优金额</div>
      <div class="legend-item"><div class="legend-dot rate"></div>最优率</div>
      <div class="legend-item"><div class="legend-line"></div>90%标杆线 / 70%警戒线</div>
    </div>
  </div>

</div>

<script>
// ===================================================================
// DATA
// ===================================================================
const bases = [
  {
    name: '佛山基地', total: 1102, optimal: 1086, nonOptimal: 15, rate: 98.6,
    provinces: [
      { name: '福建', nonOpt: 14.9, opt: 0 },
      { name: '广东', nonOpt: 0.3, opt: 441.3 }
    ],
    allOptimal: [
      { name: '广东', amt: 441.3 },
      { name: '广西', amt: 599.3 },
      { name: '海南', amt: 46.0 }
    ]
  },
  {
    name: '黄石基地', total: 217, optimal: 21, nonOptimal: 196, rate: 9.7,
    provinces: [
      { name: '湖北', nonOpt: 126.5, opt: 21.1 },
      { name: '湖南', nonOpt: 9.2, opt: 0 },
      { name: '江西', nonOpt: 60.5, opt: 0 }
    ]
  },
  {
    name: '天津基地', total: 482, optimal: 35, nonOptimal: 447, rate: 7.3,
    provinces: [
      { name: '河北', nonOpt: 1.3, opt: 0 },
      { name: '华北', nonOpt: 33.6, opt: 13.6 },
      { name: '内蒙', nonOpt: 399.0, opt: 18.6 },
      { name: '山东', nonOpt: 13.1, opt: 3.1 }
    ]
  },
  {
    name: '渭南基地', total: 403, optimal: 388, nonOptimal: 15, rate: 96.2,
    provinces: [
      { name: '河南', nonOpt: 6.0, opt: 124.0 },
      { name: '山西', nonOpt: 9.5, opt: 137.2 }
    ],
    allOptimal: [
      { name: '甘肃', amt: 126.6 },
      { name: '河南', amt: 124.0 },
      { name: '山西', amt: 137.2 }
    ]
  },
  {
    name: '长春基地', total: 1248, optimal: 256, nonOptimal: 992, rate: 20.5,
    provinces: [
      { name: '黑龙江', nonOpt: 431.3, opt: 9.5 },
      { name: '吉林', nonOpt: 32.7, opt: 19.7 },
      { name: '辽宁', nonOpt: 528.0, opt: 226.4 }
    ]
  },
  {
    name: '镇江基地', total: 567, optimal: 454, nonOptimal: 113, rate: 80.1,
    provinces: [
      { name: '安徽', nonOpt: 41.7, opt: 12.9 },
      { name: '江苏', nonOpt: 63.5, opt: 366.9 },
      { name: '浙江', nonOpt: 7.7, opt: 74.5 }
    ]
  },
  {
    name: '重庆基地', total: 169, optimal: 58, nonOptimal: 111, rate: 34.2,
    provinces: [
      { name: '贵州', nonOpt: 31.9, opt: 33.4 },
      { name: '四川', nonOpt: 3.1, opt: 1.3 },
      { name: '云南', nonOpt: 75.5, opt: 23.1 },
      { name: '重庆', nonOpt: 0.6, opt: 0 }
    ]
  }
];

const provinceRanking = [
  { name: '辽宁', amount: 528.0, base: '长春' },
  { name: '黑龙江', amount: 431.3, base: '长春' },
  { name: '内蒙', amount: 399.0, base: '天津' },
  { name: '湖北', amount: 126.5, base: '黄石' },
  { name: '云南', amount: 75.5, base: '重庆' },
  { name: '江苏', amount: 63.5, base: '镇江' },
  { name: '江西', amount: 60.5, base: '黄石' }
];

// ===================================================================
// COMPUTED
// ===================================================================
const excellentCount = bases.filter(b => b.rate >= 90).length;
const criticalCount = bases.filter(b => b.rate < 30).length;
const totalAmount = 4188;
const lossAmount = bases.reduce((s, b) => s + b.nonOptimal, 0);

// ===================================================================
// HELPERS
// ===================================================================
function getStatus(rate) {
  if (rate >= 90) return 'excellent';
  if (rate >= 70) return 'good';
  if (rate >= 30) return 'pending';
  return 'critical';
}
function getStatusLabel(rate) {
  if (rate >= 90) return '标杆';
  if (rate >= 70) return '良好';
  if (rate >= 30) return '待改进';
  return '重点关注';
}

// ===================================================================
// RENDER KPI
// ===================================================================
const kpiRow = document.getElementById('kpiRow');
kpiRow.innerHTML = `
  <div class="kpi-card">
    <div class="kpi-label">总交货单金额</div>
    <div class="kpi-value">4,188<span class="unit">万元</span></div>
    <div class="kpi-sub">7 个生产基地合计</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">整体最优发货率</div>
    <div class="kpi-value">54.7<span class="unit">%</span></div>
    <div class="kpi-sub">较优水平 <span class="highlight">尚有提升空间</span></div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">基地效能分布</div>
    <div class="kpi-value" style="font-size:22px;line-height:1.4;">
      🟢 <span class="green">${excellentCount}个</span>
      <span style="color:#5a6a8a;font-size:18px;">·</span>
      🔴 <span class="red">${criticalCount}个</span>
    </div>
    <div class="kpi-sub">标杆(>90%) · 重点关注(<30%)</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">非最优损失金额</div>
    <div class="kpi-value">${lossAmount.toLocaleString()}<span class="unit">万元</span></div>
    <div class="kpi-sub">占总金额 <span class="highlight">${(lossAmount / totalAmount * 100).toFixed(1)}%</span> · 改善空间巨大</div>
  </div>
`;

// ===================================================================
// RENDER CARDS
// ===================================================================
const cardsGrid = document.getElementById('cardsGrid');
bases.forEach((b) => {
  const status = getStatus(b.rate);
  const label = getStatusLabel(b.rate);
  const optPct = b.total > 0 ? (b.optimal / b.total * 100).toFixed(1) : 0;
  const nonOptPct = b.total > 0 ? (b.nonOptimal / b.total * 100).toFixed(1) : 0;

  // Province rows: non-optimal first, then pure-optimal
  const sumProv = b.provinces.reduce((s, x) => s + x.nonOpt, 0);
  const provRows = b.provinces.map(p => {
    const impact = sumProv > 0 ? (p.nonOpt / sumProv * 100) : 0;
    return `<tr>
      <td class="prov-name">${p.name}</td>
      <td class="amt nonopt-amt">${p.nonOpt.toFixed(1)}</td>
      <td class="amt opt-amt">${p.opt.toFixed(1)}</td>
      <td class="pct-cell"><span class="impact-bar" style="width:${Math.min(impact * 0.6, 60)}px"></span>${impact.toFixed(1)}%</td>
    </tr>`;
  }).join('');

  // Additional rows for provinces with only optimal (no nonOpt)
  const extraRows = b.allOptimal ? b.allOptimal
    .filter(p => !b.provinces.some(x => x.name === p.name))
    .map(p => `<tr>
      <td class="prov-name">${p.name}</td>
      <td class="amt nonopt-amt">0.0</td>
      <td class="amt opt-amt">${p.amt.toFixed(1)}</td>
      <td class="pct-cell">-</td>
    </tr>`).join('') : '';

  const card = document.createElement('div');
  card.className = 'base-card';
  card.innerHTML = `
    <div class="card-header">
      <div class="card-name">${b.name}</div>
      <div class="card-status ${status}">${label}</div>
    </div>
    <div class="card-stats">
      <span>总交货 <span class="stat-val">${b.total}万</span></span>
      <span>最优率 <span class="stat-val">${b.rate}%</span></span>
      <span>非最优 <span class="stat-val" style="color:#ff8a65">${b.nonOptimal}万</span></span>
    </div>
    <div class="mini-bar-wrap">
      <div class="mini-bar-label">
        <span style="color:#4fc3f7">最优 ${b.optimal}万 (${optPct}%)</span>
        <span style="color:#ff8a65">非最优 ${b.nonOptimal}万 (${nonOptPct}%)</span>
      </div>
      <div class="mini-bar">
        <div class="seg opt" style="width:${optPct}%"></div>
        <div class="seg nonopt" style="width:${nonOptPct}%"></div>
      </div>
    </div>
    <div class="card-expand-btn">
      <span class="arrow">▼</span> 查看省份详情
    </div>
    <div class="province-table-wrap">
      <table class="province-table">
        <thead>
          <tr>
            <th>省份</th>
            <th style="text-align:right">非最优(万)</th>
            <th style="text-align:right">最优(万)</th>
            <th style="text-align:right">影响占比</th>
          </tr>
        </thead>
        <tbody>${provRows}${extraRows}</tbody>
      </table>
    </div>
  `;
  card.querySelector('.card-expand-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    card.classList.toggle('expanded');
  });
  cardsGrid.appendChild(card);
});

// ===================================================================

// ===================================================================
// CHARTS — LEFT: Dual-Axis Bar + Line
// ===================================================================
const labelColor = '#8892b0';
const gridColor = 'rgba(255,255,255,0.06)';
const fontFamily = "-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif";

Chart.defaults.color = labelColor;
Chart.defaults.font.family = fontFamily;

const baseNames = bases.map(b => b.name.replace('基地', ''));
const optAmounts = bases.map(b => b.optimal);
const nonOptAmounts = bases.map(b => b.nonOptimal);
const rates = bases.map(b => b.rate);

new Chart(document.getElementById('leftChart'), {
  type: 'bar',
  data: {
    labels: baseNames,
    datasets: [
      {
        label: '最优金额(万元)',
        data: optAmounts,
        backgroundColor: 'rgba(79, 195, 247, 0.7)',
        borderColor: '#4fc3f7',
        borderWidth: 1,
        borderRadius: 3,
        order: 2
      },
      {
        label: '非最优金额(万元)',
        data: nonOptAmounts,
        backgroundColor: 'rgba(255, 138, 101, 0.7)',
        borderColor: '#ff8a65',
        borderWidth: 1,
        borderRadius: 3,
        order: 2
      },
      {
        type: 'line',
        label: '最优率(%)',
        data: rates,
        borderColor: '#d4a843',
        backgroundColor: '#d4a843',
        pointBackgroundColor: '#f6c94a',
        pointBorderColor: '#b8860b',
        pointBorderWidth: 2,
        pointRadius: 6,
        pointHoverRadius: 9,
        borderWidth: 2.5,
        tension: 0.2,
        yAxisID: 'y-pct',
        order: 1,
        spanGaps: true,
        fill: false
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: true,
    aspectRatio: 1.4,
    interaction: {
      mode: 'index',
      intersect: false
    },
    plugins: {
      legend: {
        position: 'bottom',
        labels: {
          usePointStyle: true,
          padding: 16,
          font: { size: 12 },
          color: labelColor
        }
      },
      tooltip: {
        backgroundColor: 'rgba(10,22,40,0.92)',
        titleColor: '#d4a843',
        borderColor: '#1a3055',
        borderWidth: 1,
        padding: 10,
        bodyFont: { size: 13 }
      }
    },
    scales: {
      x: {
        grid: { color: gridColor },
        ticks: { color: labelColor, font: { size: 12 } }
      },
      y: {
        position: 'left',
        title: {
          display: true,
          text: '金额（万元）',
          color: '#8892b0',
          font: { size: 12 }
        },
        grid: { color: gridColor },
        ticks: { color: labelColor, font: { size: 11 } },
        beginAtZero: true
      },
      'y-pct': {
        position: 'right',
        min: 0,
        max: 110,
        title: {
          display: true,
          text: '最优率（%）',
          color: '#d4a843',
          font: { size: 12 }
        },
        grid: { drawOnChartArea: false },
        ticks: {
          color: '#d4a843',
          font: { size: 11 },
          callback: v => v + '%'
        }
      }
    }
  },
  plugins: [{
    id: 'thresholdLines',
    afterDraw(chart) {
      const { ctx, chartArea } = chart;
      const yPctScale = chart.scales['y-pct'];
      if (!yPctScale) return;

      const thresholds = [
        { value: 90, color: 'rgba(76, 175, 80, 0.65)', label: '90% 标杆线', bg: 'rgba(76, 175, 80, 0.5)' },
        { value: 70, color: 'rgba(255, 193, 7, 0.65)', label: '70% 警戒线', bg: 'rgba(255, 193, 7, 0.5)' }
      ];

      thresholds.forEach(t => {
        const y = yPctScale.getPixelForValue(t.value);
        if (y < chartArea.top || y > chartArea.bottom) return;
        ctx.save();
        ctx.beginPath();
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = t.color;
        ctx.lineWidth = 1.5;
        ctx.moveTo(chartArea.left, y);
        ctx.lineTo(chartArea.right, y);
        ctx.stroke();

        ctx.font = '11px ' + fontFamily;
        const textW = ctx.measureText(t.label).width;
        const pad = 6;
        ctx.fillStyle = t.bg;
        ctx.fillRect(chartArea.right - textW - pad * 2 - 4, y - 8 - pad, textW + pad * 2 + 4, 16 + pad * 2);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(t.label, chartArea.right - 4, y);
        ctx.restore();
      });
    }
  }]
});

// ===================================================================
// CHARTS — RIGHT: Province Ranking (Horizontal)
// ===================================================================
const provNames = provinceRanking.map(p => p.name);
const provAmounts = provinceRanking.map(p => p.amount);
const provBases = provinceRanking.map(p => p.base);
const barColors = provAmounts.map(v =>
  v > 400 ? '#ef5350' : v > 200 ? '#ff8a65' : v > 100 ? '#ffb74d' : '#4fc3f7'
);

new Chart(document.getElementById('rightChart'), {
  type: 'bar',
  data: {
    labels: provNames,
    datasets: [{
      label: '非最优金额(万元)',
      data: provAmounts,
      backgroundColor: barColors.map(c => c + 'cc'),
      borderColor: barColors,
      borderWidth: 1,
      borderRadius: 3
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: true,
    aspectRatio: 1.4,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(10,22,40,0.92)',
        titleColor: '#d4a843',
        borderColor: '#1a3055',
        borderWidth: 1,
        padding: 10,
        callbacks: {
          afterLabel: function(context) {
            return '所属基地: ' + provBases[context.dataIndex];
          }
        }
      }
    },
    scales: {
      x: {
        beginAtZero: true,
        grid: { color: gridColor },
        ticks: { color: labelColor, font: { size: 11 } },
        title: {
          display: true,
          text: '金额（万元）',
          color: '#8892b0',
          font: { size: 11 }
        }
      },
      y: {
        grid: { display: false },
        ticks: {
          color: labelColor,
          font: { size: 13, weight: '500' }
        }
      }
    }
  },
  plugins: [{
    id: 'valueLabels',
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      const meta = chart.getDatasetMeta(0);
      ctx.save();
      ctx.font = '13px ' + fontFamily;
      ctx.textBaseline = 'middle';
      meta.data.forEach((bar, i) => {
        if (bar.hidden) return;
        const val = provAmounts[i];
        ctx.fillStyle = barColors[i];
        ctx.textAlign = 'left';
        ctx.fillText(val.toFixed(0) + '万', bar.x + 8, bar.y);
      });
      ctx.restore();
    }
  }]
});
</script>
